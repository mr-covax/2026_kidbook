<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500">
  <!-- Background -->
  <rect width="1100" height="500" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="550" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#333333">Регистрация домена</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowFlow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976D2"/>
    </marker>
  </defs>
  
  <!-- Step 1: Search -->
  <rect x="50" y="100" width="220" height="140" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="10"/>
  <!-- Search icon (magnifying glass) -->
  <circle cx="160" cy="145" r="20" fill="none" stroke="#1976D2" stroke-width="2.5"/>
  <line x1="175" y1="160" x2="188" y2="173" stroke="#1976D2" stroke-width="2.5" stroke-linecap="round"/>
  <text x="160" y="205" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1976D2">1. Поиск</text>
  <text x="160" y="225" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333333">Ввод желаемого</text>
  <text x="160" y="242" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333333">имени</text>
  
  <!-- Arrow from Step 1 to Step 2 -->
  <line x1="270" y1="170" x2="310" y2="170" stroke="#1976D2" stroke-width="2.5" marker-end="url(#arrowFlow)"/>
  
  <!-- Step 2: Check -->
  <rect x="310" y="100" width="220" height="140" fill="#BBDEFB" stroke="#1976D2" stroke-width="2" rx="10"/>
  <!-- Checkmark icon -->
  <path d="M 145 140 L 155 152 L 175 130" fill="none" stroke="#1976D2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="420" y="205" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1976D2">2. Проверка</text>
  <text x="420" y="225" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333333">Имя свободно?</text>
  <text x="420" y="242" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333333">(База данных)</text>
  
  <!-- Arrow from Step 2 to Step 3 -->
  <line x1="530" y1="170" x2="570" y2="170" stroke="#1976D2" stroke-width="2.5" marker-end="url(#arrowFlow)"/>
  
  <!-- Step 3: Payment -->
  <rect x="570" y="100" width="220" height="140" fill="#90CAF9" stroke="#1976D2" stroke-width="2" rx="10"/>
  <!-- Coin icon -->
  <ellipse cx="680" cy="145" rx="18" ry="8" fill="none" stroke="#1976D2" stroke-width="2"/>
  <line x1="662" y1="145" x2="662" y2="158" stroke="#1976D2" stroke-width="2"/>
  <line x1="698" y1="145" x2="698" y2="158" stroke="#1976D2" stroke-width="2"/>
  <path d="M 662 158 Q 680 165 698 158" fill="none" stroke="#1976D2" stroke-width="2"/>
  <text x="680" y="205" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1976D2">3. Оплата</text>
  <text x="680" y="225" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333333">Аренда на</text>
  <text x="680" y="242" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333333">1 год</text>
  
  <!-- Arrow from Step 3 to Step 4 -->
  <line x1="790" y1="170" x2="830" y2="170" stroke="#1976D2" stroke-width="2.5" marker-end="url(#arrowFlow)"/>
  
  <!-- Step 4: Ownership -->
  <rect x="830" y="100" width="220" height="140" fill="#64B5F6" stroke="#1976D2" stroke-width="2" rx="10"/>
  <!-- Certificate icon -->
  <rect x="665" y="130" width="30" height="35" fill="none" stroke="#1976D2" stroke-width="2" rx="2"/>
  <path d="M 670 142 L 677 148 L 680 145 L 685 152 L 690 147" fill="none" stroke="#1976D2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="940" y="205" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1976D2">4. Владение</text>
  <text x="940" y="225" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333333">Домен закреплён</text>
  <text x="940" y="242" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333333">за тобой</text>
  
  <!-- Big arrow at bottom showing process flow -->
  <line x1="100" y1="350" x2="1000" y2="350" stroke="#1976D2" stroke-width="4" marker-end="url(#arrowFlow)"/>
  <text x="550" y="385" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1976D2">Процесс (по шагам)</text>
</svg>